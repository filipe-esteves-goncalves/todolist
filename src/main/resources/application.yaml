spring:
  application:
    name: todolist
  docker:
    compose:
      enabled: false   # we manage compose manually; prevents auto-reconfiguration of the datasource
  datasource:
    # Use environment variables with sensible defaults so the same config
    # works when running with `docker compose` (service host = "postgres")
    # or when running locally (override DB_HOST/DB_PORT/DB_NAME as needed).
    # Prefer DB_HOST (set when running in container or via env), then POSTGRES_HOST, then localhost for local runs
    url: jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:localhost}}:${DB_PORT:5432}/${DB_NAME:mydatabase}
    driver-class-name: org.postgresql.Driver
    # Allow using DB_* env vars or fall back to Docker's POSTGRES_* vars set in compose.yaml
    username: ${DB_USER:${POSTGRES_USER:myuser}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:secret}}
    hikari:
      maximum-pool-size: 10

  jpa:
    # Ensure Hibernate uses the PostgreSQL dialect when JDBC metadata is not available
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Control schema generation as desired: none | validate | update | create | create-drop
    hibernate:
      ddl-auto: update

server:
  port: 8080

# Explicit Jakarta Persistence JDBC properties (some environments/bootstraps expect these)
jakarta:
  persistence:
    jdbc:
      url: jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:localhost}}:${DB_PORT:5432}/${DB_NAME:mydatabase}
      user: ${DB_USER:${POSTGRES_USER:myuser}}
      password: ${DB_PASSWORD:${POSTGRES_PASSWORD:secret}}

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        # Expose the standard actuator endpoints we need for checks (health/info/metrics/env)
        include: health,info,metrics,env
      # Base path for actuator is already provided below, keep consistent
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      # Enable the built-in readiness and liveness probe support so the
      # /actuator/health/liveness and /actuator/health/readiness subpaths are available.
      probes:
        enabled: true
      # Explicitly define the default groups for liveness/readiness so the sub-endpoints
      # are backed by the appropriate internal health indicators.
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState

springdoc:
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  packages-to-scan: com.filipe.todolist.controller
