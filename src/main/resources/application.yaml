spring:
  application:
    name: todoList
  datasource:
    # Use environment variables with sensible defaults so the same config
    # works when running with `docker compose` (service host = "postgres")
    # or when running locally (override DB_HOST/DB_PORT/DB_NAME as needed).
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:mydatabase}
    driver-class-name: org.postgresql.Driver
    # Allow using DB_* env vars or fall back to Docker's POSTGRES_* vars set in compose.yaml
    username: ${DB_USER:${POSTGRES_USER:myuser}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:secret}}
    hikari:
      maximum-pool-size: 10

  jpa:
    # Ensure Hibernate uses the PostgreSQL dialect when JDBC metadata is not available
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Control schema generation as desired: none | validate | update | create | create-drop
    hibernate:
      ddl-auto: update

server:
  port: 8080

# Explicit Jakarta Persistence JDBC properties (some environments/bootstraps expect these)
jakarta:
  persistence:
    jdbc:
      url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:mydatabase}
      user: ${DB_USER:${POSTGRES_USER:myuser}}
      password: ${DB_PASSWORD:${POSTGRES_PASSWORD:secret}}

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  packages-to-scan: com.filipe.todolist.controller
