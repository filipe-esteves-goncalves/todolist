name: Smoke Test (LocalStack + ECS)

on:
  workflow_run:
    workflows:
      - "Publish Docker Image to GHCR"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: LocalStack ECS Smoke Test
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: ecs,ec2,iam
          DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -s http://localhost:4566/_localstack/health | grep -q '\"ecs\": \"available\"'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: mydatabase
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd "pg_isready -U myuser -d mydatabase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install awscli-local
        run: pip install awscli-local

      - name: Configure AWS CLI for LocalStack
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set default.region us-east-1

      - name: Wait for LocalStack to be healthy
        run: |
          echo "Waiting for LocalStack ECS to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"ecs"'; then
              echo "LocalStack is ready."
              break
            fi
            echo "  attempt $i/30 – not ready yet, sleeping 5s"
            sleep 5
          done

      - name: Create ECS cluster
        run: |
          awslocal ecs create-cluster --cluster-name todo-cluster

      - name: Register ECS task definition
        run: |
          # Substitute GHCR owner in the task definition
          sed 's|ghcr.io/filipe/|ghcr.io/${{ github.repository_owner }}/|g' task-definition.json > task-def-resolved.json
          awslocal ecs register-task-definition --cli-input-json file://task-def-resolved.json

      - name: Run ECS task
        run: |
          # Create a dummy VPC/subnet for awsvpc networking in LocalStack
          VPC_ID=$(awslocal ec2 create-vpc --cidr-block 10.0.0.0/16 --query 'Vpc.VpcId' --output text)
          SUBNET_ID=$(awslocal ec2 create-subnet --vpc-id "$VPC_ID" --cidr-block 10.0.1.0/24 --query 'Subnet.SubnetId' --output text)

          awslocal ecs run-task \
            --cluster todo-cluster \
            --task-definition todo-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[\"$SUBNET_ID\"],assignPublicIp=ENABLED}"

      - name: Set up JDK 21 (to run Spring Boot app locally for smoke test)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and start the Spring Boot app for smoke testing
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: myuser
          DB_PASSWORD: secret
          DB_NAME: mydatabase
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mydatabase
          SPRING_DATASOURCE_USERNAME: myuser
          SPRING_DATASOURCE_PASSWORD: secret
        run: |
          ./mvnw package -DskipTests -q
          nohup java -jar target/todoList-*.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase \
            --spring.datasource.username=myuser \
            --spring.datasource.password=secret \
            --management.server.port=8081 \
            > app.log 2>&1 &
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Wait for app to be healthy
        run: |
          echo "Polling http://localhost:8081/actuator/health ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:8081/actuator/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || true)
            echo "  attempt $i/30 – status: '$STATUS'"
            if [ "$STATUS" = "UP" ]; then
              echo "App is UP!"
              break
            fi
            sleep 5
          done
          if [ "$STATUS" != "UP" ]; then
            echo "App never became healthy. Logs:"
            cat app.log
            exit 1
          fi

      - name: CRUD smoke test – POST (create todo)
        id: post_todo
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8080/todo \
            -H "Content-Type: application/json" \
            -d '{"title":"Smoke Test","description":"Testing CI","completed":false}')

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "POST /todo → HTTP $HTTP_CODE"
          echo "Body: $HTTP_BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Expected 201, got $HTTP_CODE"
            exit 1
          fi

          TODO_ID=$(echo "$HTTP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
          echo "TODO_ID=$TODO_ID" >> $GITHUB_ENV
          echo "Created todo with id: $TODO_ID"

      - name: CRUD smoke test – GET (verify created item)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8080/todo/$TODO_ID)
          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "GET /todo/$TODO_ID → HTTP $HTTP_CODE"
          echo "Body: $HTTP_BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Expected 200, got $HTTP_CODE"
            exit 1
          fi

          if ! echo "$HTTP_BODY" | grep -q "Smoke Test"; then
            echo "ERROR: Response does not contain 'Smoke Test'"
            exit 1
          fi
          echo "GET verified – item contains 'Smoke Test'."

      - name: Stop app
        if: always()
        run: |
          if [ -n "$APP_PID" ]; then
            kill "$APP_PID" 2>/dev/null || true
          fi

