name: Publish Docker Image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image with Spring Boot Buildpacks
        run: |
          ./mvnw spring-boot:build-image -DskipTests \
            -Dspring-boot.build-image.imageName=ghcr.io/${{ github.repository_owner }}/todo-list:latest

      - name: Push image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/todo-list:latest

